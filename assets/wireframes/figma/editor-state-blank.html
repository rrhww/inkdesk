<!DOCTYPE html>
<html class="light" lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Inkdesk 编辑页 - 空白新建</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script>tailwind.config={theme:{extend:{colors:{surface:"#f8f9fa","surface-low":"#f3f4f5","surface-card":"#ffffff",text:"#191c1d",muted:"#687573",primary:"#00685f"},fontFamily:{headline:["Manrope","PingFang SC","sans-serif"],body:["Newsreader","Source Han Serif SC","serif"],label:["Inter","PingFang SC","sans-serif"]},boxShadow:{paper:"0 18px 40px rgba(25,28,29,.06)"}}}};</script>
  <style>body{font-family:'Inter','PingFang SC',sans-serif;background:linear-gradient(180deg,#fbfcfc 0%,#f4f6f6 100%)}.ui{font-family:'Manrope','PingFang SC',sans-serif}.reading{font-family:'Newsreader','Source Han Serif SC',serif}</style>
  <link href="./inkdesk-unified.css" rel="stylesheet" />
</head>
<body class="min-h-screen bg-surface text-text">
  <div class="grid min-h-screen xl:grid-cols-[220px_minmax(0,1fr)_280px]">
    <aside class="bg-surface-low px-6 py-8"></aside>
    <main class="bg-surface-card px-8 py-10 md:px-12 lg:px-16">
      <div class="text-[11px] uppercase tracking-[.2em] text-muted">新建笔记 · 草稿</div>
      <div class="max-w-3xl">
        <h1 class="ui mt-8 text-5xl font-extrabold leading-[1.04] tracking-tight text-[#b8c0be] md:text-6xl">输入标题...</h1>
        <div class="mt-8 h-[2px] w-20 bg-primary/20"></div>
        <p class="reading mt-12 text-[1.45rem] italic leading-[1.9] text-[#a2acab]">开始记录你的思考，先写下一句你最确定的话。</p>
      </div>
    </main>
    <aside class="bg-surface-low px-6 py-8"><div class="rounded-sm bg-white px-5 py-5 shadow-paper"><div class="ui text-xs uppercase tracking-[.18em] text-muted">起步建议</div><ul class="mt-4 space-y-3 text-sm text-muted"><li>先写标题，再写一句核心判断</li><li>为文章选择一个策展主题</li><li>需要时再添加标签与封面</li></ul></div></aside>
  </div>
</body>
</html>
