<!DOCTYPE html>
<html class="light" lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Inkdesk 编辑页 - 加载中</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script>tailwind.config={theme:{extend:{colors:{surface:"#f8f9fa","surface-low":"#f3f4f5","surface-card":"#ffffff",text:"#191c1d",muted:"#687573",primary:"#00685f",outline:"#bcc9c6"},fontFamily:{headline:["Manrope","PingFang SC","sans-serif"],label:["Inter","PingFang SC","sans-serif"]},boxShadow:{paper:"0 18px 40px rgba(25,28,29,.06)"}}}};</script>
  <style>body{font-family:'Inter','PingFang SC',sans-serif;background:linear-gradient(180deg,#fbfcfc 0%,#f4f6f6 100%)}.ui{font-family:'Manrope','PingFang SC',sans-serif}.skeleton{background:linear-gradient(90deg,#edf0f0 25%,#f9fbfb 50%,#edf0f0 75%);background-size:200% 100%;animation:shimmer 2.2s linear infinite}@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}</style>
  <link href="./inkdesk-unified.css" rel="stylesheet" />
</head>
<body class="min-h-screen bg-surface text-text">
  <div class="grid min-h-screen xl:grid-cols-[220px_minmax(0,1fr)_280px]">
    <aside class="bg-surface-low px-6 py-8"><div class="ui text-[10px] uppercase tracking-[.22em] text-muted">Workspace</div></aside>
    <main class="bg-surface-card px-8 py-10 md:px-12 lg:px-16">
      <div class="rounded-full bg-white px-4 py-2 ui text-[11px] font-semibold uppercase tracking-[.18em] text-primary shadow-paper">正在检索草稿内容</div>
      <div class="mt-8 skeleton h-5 w-52 rounded-sm"></div>
      <div class="mt-5 space-y-3"><div class="skeleton h-16 w-full rounded-sm"></div><div class="skeleton h-16 w-3/4 rounded-sm"></div></div>
      <div class="mt-12 space-y-5"><div class="skeleton h-4 w-full rounded-sm"></div><div class="skeleton h-4 w-full rounded-sm"></div><div class="skeleton h-4 w-5/6 rounded-sm"></div><div class="skeleton mt-10 h-40 w-full rounded-sm"></div><div class="skeleton h-4 w-full rounded-sm"></div><div class="skeleton h-4 w-4/5 rounded-sm"></div></div>
    </main>
    <aside class="bg-surface-low px-6 py-8"><div class="rounded-sm bg-white px-5 py-5 text-sm leading-6 text-muted shadow-paper">只显示轻量加载信号，不打断版式稳定性。用户应感知“内容即将出现”，而不是被一堆占位卡片包围。</div></aside>
  </div>
</body>
</html>
