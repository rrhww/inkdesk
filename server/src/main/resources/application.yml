spring:
  application:
    name: inkdesk-server
  datasource:
    url: ${INKDESK_DB_URL:jdbc:postgresql://localhost:5432/inkdesk}
    username: ${INKDESK_DB_USERNAME:inkdesk}
    password: ${INKDESK_DB_PASSWORD:inkdesk}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  jackson:
    time-zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: health

inkdesk:
  auth:
    secret: ${APP_JWT_SECRET:inkdesk-local-owner-session-secret}
    session-duration: ${INKDESK_AUTH_SESSION_DURATION:PT8H}
