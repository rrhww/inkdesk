spring:
  datasource:
    url: jdbc:h2:mem:inkdesk;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  jackson:
    time-zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: health

inkdesk:
  auth:
    secret: test-owner-session-secret
    session-duration: PT8H
    allow-legacy-owner-cookie: true
