services:
  postgres:
    image: postgres:16-alpine
    container_name: inkdesk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inkdesk}
      POSTGRES_USER: ${POSTGRES_USER:-inkdesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inkdesk}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - inkdesk-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inkdesk} -d ${POSTGRES_DB:-inkdesk}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: inkdesk-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-inkdesk}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-inkdeskminio}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - inkdesk-minio-data:/data

volumes:
  inkdesk-postgres-data:
  inkdesk-minio-data:
