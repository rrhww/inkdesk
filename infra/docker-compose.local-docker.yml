services:
  local-postgres:
    build:
      context: .
      dockerfile: docker/postgres-pgvector.Dockerfile
    container_name: inkdesk-local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inkdesk}
      POSTGRES_USER: ${POSTGRES_USER:-inkdesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inkdesk}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - inkdesk-local-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inkdesk -d inkdesk"]
      interval: 10s
      timeout: 5s
      retries: 10

  local-server:
    build:
      context: ../server
      dockerfile: ../infra/docker/local-server.Dockerfile
    container_name: inkdesk-local-server
    restart: unless-stopped
    depends_on:
      local-postgres:
        condition: service_healthy
    environment:
      INKDESK_ENV: ${INKDESK_ENV:-local}
      INKDESK_DB_URL: postgresql+psycopg://${POSTGRES_USER:-inkdesk}:${POSTGRES_PASSWORD:-inkdesk}@local-postgres:5432/${POSTGRES_DB:-inkdesk}
      INKDESK_VAULT_ROOT: /app/inkdesk-vault
      INKDESK_AUTH_SECRET: ${INKDESK_AUTH_SECRET:-replace-with-a-long-random-secret}
      INKDESK_AUTH_SESSION_DURATION: ${INKDESK_AUTH_SESSION_DURATION:-PT8H}
      INKDESK_AUTH_ALLOW_LEGACY_OWNER_COOKIE: ${INKDESK_AUTH_ALLOW_LEGACY_OWNER_COOKIE:-true}
      INKDESK_AGENT_RUNTIME: ${INKDESK_AGENT_RUNTIME:-langgraph}
      INKDESK_AGENT_PROVIDER_PROFILE: ${INKDESK_AGENT_PROVIDER_PROFILE:-openai}
      INKDESK_AGENT_MODEL: ${INKDESK_AGENT_MODEL:-}
      INKDESK_AGENT_API_KEY: ${INKDESK_AGENT_API_KEY:-}
      INKDESK_AGENT_BASE_URL: ${INKDESK_AGENT_BASE_URL:-}
      INKDESK_AGENT_CONNECT_TIMEOUT_SECONDS: ${INKDESK_AGENT_CONNECT_TIMEOUT_SECONDS:-2}
      INKDESK_AGENT_READ_TIMEOUT_SECONDS: ${INKDESK_AGENT_READ_TIMEOUT_SECONDS:-20}
      INKDESK_EMBEDDING_PROVIDER_PROFILE: ${INKDESK_EMBEDDING_PROVIDER_PROFILE:-openai}
      INKDESK_EMBEDDING_MODEL: ${INKDESK_EMBEDDING_MODEL:-text-embedding-3-small}
      INKDESK_EMBEDDING_API_KEY: ${INKDESK_EMBEDDING_API_KEY:-}
      INKDESK_EMBEDDING_BASE_URL: ${INKDESK_EMBEDDING_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      INKDESK_ENABLE_WEB_ASSIST: ${INKDESK_ENABLE_WEB_ASSIST:-true}
      INKDESK_ENABLE_LOCAL_SEED: ${INKDESK_ENABLE_LOCAL_SEED:-true}
    ports:
      - "${INKDESK_SERVER_PORT:-8080}:8080"
    volumes:
      - inkdesk-local-vault-data:/app/inkdesk-vault

  local-web:
    build:
      context: ../web
      dockerfile: ../infra/docker/local-web.Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:${INKDESK_SERVER_PORT:-8080}
    container_name: inkdesk-local-web
    restart: unless-stopped
    depends_on:
      local-server:
        condition: service_started
    environment:
      INKDESK_API_BASE_URL: http://local-server:8080
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${INKDESK_SERVER_PORT:-8080}
    ports:
      - "${INKDESK_WEB_PORT:-3000}:3000"

volumes:
  inkdesk-local-postgres-data:
  inkdesk-local-vault-data:
